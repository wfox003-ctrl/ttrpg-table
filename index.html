<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ブラウザで使えるシンプルなTTRPG卓ツール" />
    <title>TRPG 卓上ツール</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header>
        <p class="eyebrow">OFFLINE TABLETOP</p>
        <h1>TRPG 卓上ツール</h1>
        <p class="subtitle">ダイスを振って、セッションログを残そう。</p>
        <div class="sync-indicator" aria-live="polite"><span id="hourglass" class="hourglass" aria-hidden="true"></span><span id="sync-status">5秒ごとに同期</span></div>
      </header>

      <section class="table-card scene-card" aria-label="現在の場面">
        <div class="section-heading"><h2>現在の場面</h2><button id="save-scene" class="text-button" type="button">場面を更新</button></div>
        <div id="scene-image" class="scene-image" hidden><img alt="現在の場面画像" /></div>
        <label for="scene-text">状況</label>
        <textarea id="scene-text" maxlength="500" placeholder="例：雨の降る古い洋館。地下から物音が聞こえる。"></textarea>
      </section>

      <section id="combat-board" class="table-card combat-card" aria-label="戦闘ボード" hidden>
        <div class="section-heading"><h2>戦闘</h2><span id="combat-round">第1ラウンド</span></div>
        <div id="enemy-list" class="enemy-list"></div>
      </section>

      <div class="table-grid">
        <section class="table-card dice-card" aria-label="ダイス">
          <div class="section-heading">
            <h2>ダイス</h2>
            <span>例：1d100 / 2d6+3</span>
          </div>
          <form id="dice-form">
            <label for="dice-command">ダイスコマンド</label>
            <div class="dice-input-row">
              <input id="dice-command" autocomplete="off" value="1d100" />
              <button type="submit" class="primary">振る</button>
            </div>
          </form>
          <div class="quick-dice" aria-label="よく使うダイス">
            <button data-dice="1d100">1d100</button>
            <button data-dice="1d20">1d20</button>
            <button data-dice="2d6">2d6</button>
            <button data-dice="1d6">1d6</button>
          </div>
          <output id="dice-result" class="dice-result" aria-live="polite">ダイスを振ってください</output>
        </section>

        <section class="table-card chat-card" aria-label="会話ログ">
          <div class="section-heading">
            <h2>会話ログ</h2>
            <button id="clear-log" class="text-button" type="button">ログを消去</button>
          </div>
          <div id="log" class="log" aria-live="polite"></div>
          <form id="chat-form" class="chat-form">
            <label class="sr-only" for="player-name">発言者</label>
            <select id="player-name" aria-label="発言するプレイヤー"><option value="GM">GM</option></select>
            <label class="sr-only" for="chat-message">発言</label>
            <input id="chat-message" maxlength="280" autocomplete="off" placeholder="発言を入力…" />
            <button type="submit" class="primary">送信</button>
          </form>
        </section>
      </div>

      <section class="table-card status-card" aria-label="プレイヤーステータス">
        <div class="section-heading"><h2>プレイヤーステータス</h2><button id="save-status" class="text-button" type="button">ステータスを更新</button></div>
        <div id="players" class="players"></div>
      </section>
    </main>
    <template id="log-entry-template">
      <article class="log-entry">
        <div class="log-meta"><strong></strong><time></time></div>
        <p></p>
      </article>
    </template>
    <template id="player-template">
      <article class="player-card">
        <div class="portrait" hidden><img alt="キャラクター立ち絵" /></div>
        <input class="character-name" maxlength="24" placeholder="キャラクター名" />
        <label>HP <output class="hp-value"></output></label>
        <div class="hp-row"><input class="hp" type="number" min="0" value="10" /><span>/</span><input class="max-hp" type="number" min="1" value="10" /></div>
        <div class="resource-row"><label>MP<input class="mp" type="number" min="0" value="0" /></label><label>SP<input class="sp" type="number" min="0" value="0" /></label></div>
        <label>装備<input class="equipment" maxlength="80" placeholder="例：ロングソード" /></label>
        <label>持ち物<input class="items" maxlength="120" placeholder="例：回復薬、松明" /></label>
        <label>状態<input class="condition" maxlength="80" placeholder="例：正常、毒、負傷" /></label>
        <label>設定・性格<input class="personality" maxlength="160" placeholder="例：冷静な魔術師。仲間思いだが口数は少ない。" /></label>
      </article>
    </template>
    <script src="app.js"></script>
  </body>
</html>
